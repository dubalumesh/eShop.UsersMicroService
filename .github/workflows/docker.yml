name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Extract short Git SHA
      - name: Set Git SHA
        run: echo "SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      # 4. Build and push Docker image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./UsersMicroService.API/Dockerfile
          push: true
          tags: |
            dubalumesh/eshop.users-microservice:latest
            dubalumesh/eshop.users-microservice:${{ env.SHA_SHORT }}